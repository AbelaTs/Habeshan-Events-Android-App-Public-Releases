name: Build & Release Android APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true
      release_notes:
        description: "Release notes (what changed)"
        required: false
        default: "Bug fixes and performance improvements."

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.29.3"
  JAVA_VERSION: "17"

jobs:
  build-and-release:
    name: Build APK & Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SOURCE_REPO }}
          token: ${{ secrets.SOURCE_REPO_PAT }}
          path: source

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > source/mobile/android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > source/mobile/android/key.properties << 'PROPS'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          PROPS

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > source/mobile/android/app/google-services.json

      - name: Install dependencies
        working-directory: source/mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: source/mobile
        run: |
          flutter build apk \
            --release \
            --build-name=${{ github.event.inputs.version }} \
            --build-number=${{ github.run_number }}

      - name: Rename APK
        run: |
          mv source/mobile/build/app/outputs/flutter-apk/app-release.apk \
             habeshan-events-v${{ github.event.inputs.version }}.apk

      - name: Checkout releases repo
        uses: actions/checkout@v4
        with:
          path: releases

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Habeshan Events v${{ github.event.inputs.version }}
          body: |
            ## Habeshan Events v${{ github.event.inputs.version }}

            ${{ github.event.inputs.release_notes }}

            ---
            **Build:** #${{ github.run_number }}
            **Min Android:** 5.0 (API 21)

            ### Install
            Download `habeshan-events-v${{ github.event.inputs.version }}.apk` below and install on your Android device.
          files: habeshan-events-v${{ github.event.inputs.version }}.apk
          draft: false
          prerelease: false
